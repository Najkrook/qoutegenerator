<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mina Offerter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components/buttons.css">

    <script type="module">
        import { requireAuth, onAuthChange } from './services/authService.js';
        requireAuth();

        onAuthChange((user) => {
            const badge = document.getElementById('userBadge');
            if (badge && user) {
                badge.querySelector('.user-email').textContent = user.email;
                badge.style.display = 'flex';
            }
        });
    </script>

    <style>
        .history-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .history-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(31, 41, 55, 0.9);
        }

        .history-details h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
        }

        .history-details p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .history-actions {
            display: flex;
            gap: 0.6rem;
            flex-shrink: 0;
            flex-direction: column;
            align-items: stretch;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
        }

        .status-inline {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-inline select {
            padding: 0.35rem 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
            background: var(--panel-bg);
            color: var(--text-primary);
        }

        .history-title-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.35rem;
        }

        .history-title-row h3 {
            margin: 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            font-size: 0.7rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
        }

        .status-draft {
            background: rgba(148, 163, 184, 0.18);
            color: #cbd5e1;
        }

        .status-sent {
            background: rgba(59, 130, 246, 0.18);
            color: #93c5fd;
        }

        .status-won {
            background: rgba(16, 185, 129, 0.2);
            color: #86efac;
        }

        .status-lost {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .status-archived {
            background: rgba(168, 85, 247, 0.2);
            color: #d8b4fe;
        }

        .history-total {
            margin-top: 0.5rem;
            color: var(--success-color);
            font-weight: 600;
        }

        .history-revisions {
            margin-top: 1rem;
            grid-column: 1 / -1;
        }

        .revisions-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-top: 0.5rem;
        }

        .revisions-empty {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin: 0.35rem 0 0.2rem 0;
        }

        .revision-btn {
            width: 100%;
            text-align: left;
            border: 1px solid var(--panel-border);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.8rem;
            padding: 0.55rem 0.75rem;
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
            cursor: pointer;
        }

        .history-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .history-filter-row {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .history-filter-row select,
        .history-filter-row input {
            padding: 0.5rem 0.65rem;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
            background: var(--panel-bg);
            color: var(--text-primary);
            min-width: 180px;
        }

        .history-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            background: var(--panel-bg);
            border: 1px dashed var(--panel-border);
            border-radius: 8px;
        }

        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .history-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .history-actions {
                width: 100%;
                justify-content: stretch;
            }

            .history-actions button {
                flex: 1;
            }

            .history-filter-row select,
            .history-filter-row input {
                min-width: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <h1 style="margin: 0;">Mina Offerter</h1>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <a href="index.html" class="primary" style="text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem;">+ Ny Offert</a>
                <a href="inventory-logs.html" style="text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem; border: 1px solid var(--panel-border); color: var(--text-primary); background: var(--panel-bg);">Lagerloggar</a>

                <div id="userBadge" style="display: none; align-items: center; gap: 0.5rem;
                    background: var(--panel-bg); padding: 0.35rem 0.75rem; border-radius: 6px;
                    border: 1px solid var(--panel-border); font-size: 0.8rem;">
                    <span style="color: var(--text-secondary);">&#x1F464;</span>
                    <span class="user-email" style="color: var(--text-primary); font-weight: 500;"></span>
                    <button data-action="logout" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 0.75rem; padding: 0.2rem 0.4rem;
                        border-left: 1px solid var(--panel-border); margin-left: 0.25rem;" title="Logga ut">Logga ut</button>
                </div>
            </div>
        </div>
    </header>

    <main style="max-width: 900px;">
        <div class="history-toolbar">
            <div class="history-filter-row">
                <select id="historyStatusFilter" aria-label="Filtrera pa status">
                    <option value="">Alla statusar</option>
                    <option value="draft">Utkast</option>
                    <option value="sent">Skickad</option>
                    <option value="won">Vunnen</option>
                    <option value="lost">Forlorad</option>
                    <option value="archived">Arkiverad</option>
                </select>
                <input id="historySearch" type="text" placeholder="Sok kund, foretag eller referens">
            </div>
            <div id="historyMeta" class="history-meta">Laddar offerter...</div>
        </div>
        <div id="historyContainer">
            <div class="loading-state">Laddar offerter...</div>
        </div>
    </main>

    <script type="module" src="history.js"></script>
</body>

</html>
