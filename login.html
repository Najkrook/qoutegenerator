<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in - BRIXX Offertverktyg</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-color, #0f0f1a);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .login-card {
            background: var(--panel-bg, #1a1a2e);
            border: 1px solid var(--panel-border, #2a2a3e);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .login-card h1 {
            margin: 0 0 0.25rem 0;
            font-size: 1.6rem;
            color: var(--text-primary, #eee);
        }

        .login-card .subtitle {
            color: var(--text-secondary, #888);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .login-card .form-group {
            margin-bottom: 1.25rem;
        }

        .login-card label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary, #aaa);
            margin-bottom: 0.4rem;
        }

        .login-card input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            background: var(--bg-color, #0f0f1a);
            border: 1px solid var(--panel-border, #333);
            border-radius: 8px;
            color: var(--text-primary, #eee);
            font-family: inherit;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .login-card input:focus {
            outline: none;
            border-color: var(--primary, #f39c12);
        }

        .login-btn {
            width: 100%;
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-area .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f39c12;
            letter-spacing: 3px;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--panel-border, #2a2a3e);
            margin: 1.5rem 0;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-text">BRIXX</div>
        </div>
        <h1>Offertverktyg</h1>
        <p class="subtitle">Logga in för att fortsätta.</p>

        <div id="loginError" class="error-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-post</label>
                <input type="email" id="email" placeholder="namn@brixx.se" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Lösenord</label>
                <input type="password" id="password" placeholder="********" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Logga in</button>
        </form>

        <hr class="divider">
        <p style="text-align: center; font-size: 0.75rem; color: var(--text-secondary, #666); margin: 0;">
            BRIXX Europe AB &middot; Offertverktyg v2
        </p>
    </div>

    <script type="module">
        import { login, onAuthChange } from './services/authService.js';

        // If already logged in, redirect
        onAuthChange((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Loggar in...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                await login(email, password);
                // onAuthChange will handle the redirect
            } catch (err) {
                console.error('Firebase Auth Error:', err);
                let msg = 'Inloggningen misslyckades.';
                if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
                    msg = 'Fel e-post eller lösenord.';
                } else if (err.code === 'auth/user-not-found') {
                    msg = 'Ingen användare hittades med den e-posten.';
                } else if (err.code === 'auth/too-many-requests') {
                    msg = 'För många försök. Vänta en stund och försök igen.';
                } else {
                    msg = `Systemfel: ${err.code || err.message}`;
                }
                errorEl.textContent = msg;
                errorEl.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Logga in';
            }
        });
    </script>
</body>

</html>
