name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  safety-and-sanity:
    name: Safety and Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify sensitive/local-only files are not tracked
        shell: pwsh
        run: ./scripts/verify-git-safety.ps1

      - name: Ensure repository remains clean after checks
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Repository is dirty after checks:"
            git status --short
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Run fast confidence tests
        shell: bash
        run: npm run test:confidence

      - name: Build production bundle
        shell: bash
        run: npm run build
